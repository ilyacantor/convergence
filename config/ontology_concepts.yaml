# DCL Enterprise Ontology — Single Source of Truth
# 9 domains, expanding to ~107 concepts
# Each concept: id, concept_id, name, description, domain, cluster,
#   example_fields, aliases, expected_type, typical_source_systems, persona_relevance,
#   recognition_basis, timing_semantics, scope_boundaries, calculation_methodology, comparability_rules

concepts:
  # ─── Finance ──────────────────────────────────────────────
  - id: gl_account
    concept_id: FIN-001
    name: General Ledger Account
    description: "Chart of accounts entry for financial tracking"
    domain: finance
    cluster: Finance
    example_fields:
      - gl_account
      - account_code
      - coa_entry
      - ledger_account
      - account_number
      - account_name
      - account_type
      - parent_account
    aliases:
      - chart_of_accounts
      - coa
      - ledger_entry
      - general_ledger
    expected_type: string
    typical_source_systems: [netsuite, sap, quickbooks, xero]
    persona_relevance:
      cfo: 1.0
      coo: 0.4
    recognition_basis: "Established when account is created in the chart of accounts. Active when transactions post against it."
    timing_semantics: "Point-in-time reference entity. Account structure changes take effect at the start of a fiscal period."
    scope_boundaries: "Includes all accounts in the chart of accounts hierarchy. Excludes statistical accounts and memo-only entries. Scoped to a single legal entity or consolidated reporting entity."
    calculation_methodology: null
    comparability_rules: "Comparable only within the same chart of accounts structure. Cross-entity comparison requires COA mapping. Different ERP systems may use different account numbering schemes (4-digit vs 6-digit)."

  - id: invoice
    concept_id: FIN-006
    name: Invoice
    description: "Billing document for goods or services"
    domain: finance
    cluster: Finance
    example_fields:
      - invoice_id
      - invoice_number
      - bill_id
      - statement_id
      - invoice_date
      - due_date
      - invoice_amount
    aliases:
      - bill
      - billing_record
      - statement
      - inv
    expected_type: string
    typical_source_systems: [netsuite, stripe, bill_com, quickbooks]
    persona_relevance:
      cfo: 0.9
      coo: 0.4
    recognition_basis: "Created upon billing event — issuance of a demand for payment for goods delivered or services rendered."
    timing_semantics: "Point-in-time event. Invoice date determines the billing period. Due date determines the collection timeline."
    scope_boundaries: "Includes customer-facing invoices, credit memos, and debit memos. Excludes pro-forma invoices and internal chargebacks unless explicitly included."
    calculation_methodology: null
    comparability_rules: "Invoice amounts are comparable only when currency and tax treatment match. Gross vs net invoice amounts must be distinguished. Multi-currency invoices require FX rate alignment."

  - id: revenue
    concept_id: FIN-010
    name: Revenue
    description: "GAAP-recognized revenue from the sale of goods and delivery of services"
    domain: finance
    cluster: Finance
    example_fields:
      - amount
      - revenue
      - total
      - value
      - price
      - mrr
      - arr
      - recognized_rev
      - sales_revenue
    aliases:
      - income
      - sales
      - billing
      - earnings
      - rev
      - recognized_revenue
    expected_type: float
    typical_source_systems: [netsuite, salesforce, zuora, stripe]
    persona_relevance:
      cfo: 1.0
      cro: 0.9
      coo: 0.5
    recognition_basis: "GAAP-recognized at point of delivery or ratably over service period. Triggered by contractual performance obligation satisfaction under ASC 606."
    timing_semantics: "Period-based, recognized in the period when performance obligations are satisfied. Revenue from multi-year contracts is allocated across delivery periods."
    scope_boundaries: "Net of returns, allowances, and estimated credit losses. Excludes pass-through reimbursable expenses and intercompany transactions. Includes subscription, professional services, and usage-based revenue."
    calculation_methodology: "Sum of all GL accounts in the 4xxx revenue range for the reporting entity. Subscription revenue recognized ratably; services revenue recognized on delivery milestones; usage revenue recognized on consumption."
    comparability_rules: "Comparable only when recognition basis matches (both GAAP or both booked-at-close). CRM pipeline value is NOT comparable to ERP recognized revenue. Different fiscal year-ends require period alignment before comparison."

  - id: cost
    concept_id: FIN-011
    name: Expense
    description: "Cost incurred in business operations"
    domain: finance
    cluster: Finance
    example_fields:
      - cost
      - spend
      - expense
      - price
      - budget
      - expenditure
      - opex
      - blended_cost
      - unblended_cost
    aliases:
      - expense
      - spending
      - expenditure
      - opex
    expected_type: float
    typical_source_systems: [expensify, concur, brex, ramp, netsuite]
    persona_relevance:
      cfo: 1.0
      coo: 0.7
      cto: 0.6
    recognition_basis: "Recognized when the economic benefit is consumed or the obligation is incurred, per GAAP matching principle."
    timing_semantics: "Period-based, matched to the period in which the related revenue is recognized or the cost is incurred."
    scope_boundaries: "Includes operating expenses (OpEx), cost of goods sold (COGS), and SG&A. Excludes capital expenditures (CapEx) and depreciation/amortization unless specified. Scoped to a single legal entity."
    calculation_methodology: "Sum of all GL accounts in the expense ranges (5xxx-9xxx) for the reporting entity, excluding contra-revenue and below-the-line items."
    comparability_rules: "Comparable only when expense classification matches (e.g., both COGS or both OpEx). Capitalized vs expensed treatment must be aligned. Intercompany cost allocations distort cross-entity comparison."

  - id: currency
    concept_id: FIN-015
    name: Currency
    description: "Monetary denomination for transactions"
    domain: finance
    cluster: Finance
    example_fields:
      - currency
      - currency_code
      - ccy
      - fx
      - exchange_currency
    aliases:
      - fx
      - exchange_rate
      - monetary_unit
    expected_type: string
    typical_source_systems: [any_multi_currency_system, netsuite, sap]
    persona_relevance:
      cfo: 0.7
    recognition_basis: "System-assigned at transaction entry based on the originating entity's functional currency or the transaction currency."
    timing_semantics: "Point-in-time attribute. Exchange rate applied at transaction date or period-end rate for balance sheet items."
    scope_boundaries: "Includes ISO 4217 currency codes. Covers functional currency, transaction currency, and reporting currency distinctions."
    calculation_methodology: null
    comparability_rules: "All monetary comparisons require currency normalization. Must specify whether spot rate, average rate, or period-end rate is used for conversion. Functional currency differences between entities invalidate direct comparison."

  - id: journal_entry
    concept_id: FIN-002
    name: Journal Entry
    description: "Double-entry accounting transaction record"
    domain: finance
    cluster: Finance
    example_fields:
      - entry_id
      - debit_amount
      - credit_amount
      - posting_date
      - memo
      - journal_line
    aliases:
      - je
      - journal_line
      - accounting_entry
      - gl_transaction
    expected_type: string
    typical_source_systems: [netsuite, sap, oracle_erp]
    persona_relevance:
      cfo: 0.9
    recognition_basis: "Created when a financial transaction is recorded in the general ledger. Triggered by posting of debits and credits."
    timing_semantics: "Point-in-time event. Posting date determines the fiscal period. Effective date may differ from entry date for accruals and adjustments."
    scope_boundaries: "Includes standard journal entries, adjusting entries, closing entries, and reversing entries. Excludes recurring template entries until posted."
    calculation_methodology: null
    comparability_rules: "Comparable only within the same general ledger. Cross-system journal entries require account mapping. Auto-generated vs manual entries should be distinguished."

  - id: cost_center
    concept_id: FIN-003
    name: Cost Center
    description: "Organizational unit for cost allocation"
    domain: finance
    cluster: Finance
    example_fields:
      - cost_center
      - center_id
      - center_name
      - manager
      - budget_amount
      - department_code
    aliases:
      - cc
      - department_code
      - profit_center
    expected_type: string
    typical_source_systems: [sap, workday, oracle]
    persona_relevance:
      cfo: 0.9
      coo: 0.6
    recognition_basis: "Established as part of organizational design. Active when expenses are allocated or posted against it."
    timing_semantics: "Point-in-time reference entity. Cost center hierarchy changes take effect at reorganization events."
    scope_boundaries: "Includes all organizational units designated for cost tracking. May overlap with departments but is not synonymous. Excludes profit centers and investment centers unless explicitly mapped."
    calculation_methodology: null
    comparability_rules: "Comparable only within the same organizational hierarchy. Cross-entity cost center comparison requires mapping tables. Different granularity levels (L1 vs L3) are not directly comparable."

  - id: budget
    concept_id: FIN-004
    name: Budget
    description: "Planned financial allocation for a period"
    domain: finance
    cluster: Finance
    example_fields:
      - budget_id
      - budget
      - period
      - amount
      - category
      - budget_line
      - planned_spend
    aliases:
      - budget_line
      - planned_spend
      - fiscal_plan
    expected_type: float
    typical_source_systems: [adaptive_insights, anaplan, vena]
    persona_relevance:
      cfo: 1.0
      coo: 0.5
    recognition_basis: "Established during annual or quarterly planning cycles. Approved by finance leadership before activation."
    timing_semantics: "Period-based, scoped to a fiscal period (month, quarter, or year). Budget vs actual comparison requires matching periods."
    scope_boundaries: "Includes approved operating budget allocations. Excludes capital budgets and contingency reserves unless explicitly included. Scoped to a cost center, department, or project."
    calculation_methodology: "Sum of approved budget line items for the specified organizational unit and fiscal period. May be top-down allocated or bottom-up aggregated."
    comparability_rules: "Comparable only when budget methodology matches (top-down vs bottom-up). Original budget vs revised budget vs forecast must be distinguished. Cross-year comparison requires inflation and headcount normalization."

  - id: forecast
    concept_id: FIN-005
    name: Forecast
    description: "Projected financial outcome"
    domain: finance
    cluster: Finance
    example_fields:
      - forecast_id
      - forecast
      - projection
      - outlook
      - estimated_revenue
      - confidence
    aliases:
      - projection
      - outlook
      - estimated_revenue
    expected_type: float
    typical_source_systems: [clari, anaplan, pigment]
    persona_relevance:
      cfo: 0.9
      cro: 0.7
    recognition_basis: "Generated from financial models using historical data, pipeline assumptions, and management judgment."
    timing_semantics: "Forward-looking, projected for future periods. Forecast vintage (when it was created) affects comparability."
    scope_boundaries: "Includes revenue forecast, expense forecast, and cash flow projections. Excludes scenario analysis and stress tests unless explicitly included."
    calculation_methodology: "Model-dependent: may use weighted pipeline, historical trend extrapolation, or bottoms-up build. Methodology must be documented for each forecast vintage."
    comparability_rules: "Comparable only when forecast methodology and vintage match. Pipeline-based forecast is NOT comparable to trend-based forecast. Different confidence levels (commit vs best-case vs upside) must be distinguished."

  - id: payment
    concept_id: FIN-007
    name: Payment
    description: "Financial transaction settling an obligation"
    domain: finance
    cluster: Finance
    example_fields:
      - payment_id
      - payment_amount
      - payment_date
      - payment_method
      - remittance
      - disbursement
      - settlement
    aliases:
      - remittance
      - pmt
      - disbursement
      - settlement
    expected_type: string
    typical_source_systems: [stripe, paypal, bill_com, banks]
    persona_relevance:
      cfo: 0.8
    recognition_basis: "Recorded when funds are transferred or received. Settlement date determines the payment event."
    timing_semantics: "Point-in-time event. Payment date may differ from invoice date and revenue recognition date."
    scope_boundaries: "Includes all cash disbursements and receipts — ACH, wire, check, credit card. Excludes non-cash settlements and barter transactions."
    calculation_methodology: null
    comparability_rules: "Comparable only when payment method and currency match. Gross payment vs net-of-fees payment must be distinguished. Payment timing differences (net-30 vs net-60) affect cash flow comparison."

  - id: payment_status
    concept_id: FIN-PS1
    name: Payment Status
    description: "Payment or transaction status"
    domain: finance
    cluster: Finance
    example_fields:
      - payment_status
      - status
      - payment_state
      - transaction_status
    aliases:
      - transaction_status
      - billing_status
    expected_type: string
    typical_source_systems: [stripe, netsuite, bill_com]
    persona_relevance:
      cfo: 0.6
    recognition_basis: "System-assigned based on payment lifecycle events — created, pending, completed, failed, refunded."
    timing_semantics: "Point-in-time state. Status transitions are event-driven and timestamped."
    scope_boundaries: "Covers the full payment lifecycle from initiation to settlement or failure. Includes partial payments and payment plans."
    calculation_methodology: null
    comparability_rules: "Comparable only when status taxonomy matches across systems. Different payment processors may use different status labels for equivalent states (e.g., 'settled' vs 'completed')."

  - id: accounts_receivable
    concept_id: FIN-008
    name: Accounts Receivable
    description: "Money owed to the organization"
    domain: finance
    cluster: Finance
    example_fields:
      - ar_id
      - receivable
      - outstanding_balance
      - amt_due
      - aging_bucket
      - ar
      - amount_due
      - days_outstanding
      - amount_paid
    aliases:
      - ar
      - receivable
      - outstanding_balance
      - amt_due
    expected_type: float
    typical_source_systems: [netsuite, sap, quickbooks]
    persona_relevance:
      cfo: 0.9
    recognition_basis: "Created when an invoice is issued. Reduced when payment is received or write-off is posted."
    timing_semantics: "Point-in-time balance. AR aging is measured from invoice date. Period-end snapshots are used for reporting."
    scope_boundaries: "Includes trade receivables from customer invoices. Excludes employee receivables, intercompany receivables, and non-trade receivables unless specified."
    calculation_methodology: "Sum of outstanding invoice balances less payments received, credit memos, and allowance for doubtful accounts. Aging buckets: current, 30-day, 60-day, 90-day, 120+ day."
    comparability_rules: "Comparable only at matching period-end dates. Gross AR vs net AR (after allowances) must be distinguished. Different aging bucket definitions invalidate direct comparison."

  - id: accounts_payable
    concept_id: FIN-009
    name: Accounts Payable
    description: "Money owed by the organization"
    domain: finance
    cluster: Finance
    example_fields:
      - ap_id
      - payable
      - vendor_balance
      - amt_owed
      - payment_terms
      - ap
    aliases:
      - ap
      - payable
      - vendor_balance
      - amt_owed
    expected_type: float
    typical_source_systems: [netsuite, sap, coupa]
    persona_relevance:
      cfo: 0.9
      coo: 0.4
    recognition_basis: "Created when a vendor invoice or purchase obligation is recorded. Reduced when payment is disbursed."
    timing_semantics: "Point-in-time balance. AP aging is measured from invoice receipt date. Period-end snapshots are used for reporting."
    scope_boundaries: "Includes trade payables to vendors and suppliers. Excludes accrued liabilities, intercompany payables, and non-trade payables unless specified."
    calculation_methodology: "Sum of outstanding vendor invoice balances less payments made and early payment discounts taken. Aging buckets: current, 30-day, 60-day, 90-day, 120+ day."
    comparability_rules: "Comparable only at matching period-end dates. Must distinguish between AP balance and accrued expenses. Different payment terms across vendors affect aging comparison."

  - id: financial_period
    concept_id: FIN-012
    name: Financial Period
    description: "Fiscal time boundary for reporting"
    domain: finance
    cluster: Finance
    example_fields:
      - fiscal_period
      - quarter
      - fy
      - reporting_period
      - period_id
      - start_date
      - end_date
    aliases:
      - fiscal_period
      - quarter
      - reporting_period
      - fy
    expected_type: string
    typical_source_systems: [netsuite, sap, any_erp]
    persona_relevance:
      cfo: 0.8
    recognition_basis: "Defined by the organization's fiscal calendar. Periods are established during annual calendar setup."
    timing_semantics: "Defines the temporal boundary for financial reporting. Period open/close status controls transaction posting."
    scope_boundaries: "Includes fiscal months, quarters, and years. May include adjustment periods (period 13) for year-end entries. Calendar year vs fiscal year distinction is critical."
    calculation_methodology: null
    comparability_rules: "Comparable only when fiscal calendar alignment is confirmed. January fiscal year-end vs June fiscal year-end makes Q1 refer to different calendar months. 4-4-5 vs calendar month periods are not directly comparable."

  - id: tax
    concept_id: FIN-013
    name: Tax
    description: "Tax obligation or credit"
    domain: finance
    cluster: Finance
    example_fields:
      - tax_id
      - tax
      - tax_line
      - vat
      - sales_tax
      - withholding
      - rate
      - jurisdiction
    aliases:
      - vat
      - sales_tax
      - withholding
      - tax_line
    expected_type: float
    typical_source_systems: [avalara, vertex, netsuite]
    persona_relevance:
      cfo: 0.8
    recognition_basis: "Calculated at transaction time based on jurisdiction, product taxability, and customer exemptions."
    timing_semantics: "Point-in-time calculation at transaction date. Tax liability accrues in the period of the transaction."
    scope_boundaries: "Includes sales tax, use tax, VAT, GST, and withholding tax. Excludes income tax and property tax unless specified."
    calculation_methodology: "Tax amount = taxable base x applicable tax rate for the jurisdiction. Multi-jurisdiction transactions require nexus determination."
    comparability_rules: "Comparable only within the same tax jurisdiction and tax type. Gross-of-tax vs net-of-tax amounts must be distinguished. Tax-inclusive vs tax-exclusive pricing affects base amount comparison."

  - id: fixed_asset
    concept_id: FIN-014
    name: Fixed Asset
    description: "Capitalized long-term business asset"
    domain: finance
    cluster: Finance
    example_fields:
      - asset_id
      - fixed_asset
      - cost
      - depreciation_method
      - useful_life
      - nbv
      - capital_asset
    aliases:
      - fa
      - capital_asset
      - property
      - fixed_asset
    expected_type: string
    typical_source_systems: [sap, oracle, netsuite]
    persona_relevance:
      cfo: 0.7
    recognition_basis: "Capitalized when the asset is placed in service and meets the capitalization threshold. Subject to depreciation over useful life."
    timing_semantics: "Point-in-time balance. Depreciation is period-based. Asset life events (acquisition, impairment, disposal) are timestamped."
    scope_boundaries: "Includes tangible assets (PP&E) meeting capitalization thresholds. Excludes operating leases (unless ASC 842 right-of-use), intangible assets, and expense items below threshold."
    calculation_methodology: null
    comparability_rules: "Comparable only when depreciation method (straight-line vs accelerating) and useful life assumptions match. Different capitalization thresholds across entities affect asset counts. Net book value vs gross cost must be distinguished."

  # ─── Sales & Revenue ─────────────────────────────────────
  - id: account
    concept_id: SAL-001
    name: Account
    description: "Business entity or customer organization"
    domain: sales
    cluster: Growth
    example_fields:
      - account_id
      - account_name
      - company
      - customer_id
      - customer
      - client_id
    aliases:
      - customer
      - client
      - organization
      - org
      - company
    expected_type: string
    typical_source_systems: [salesforce, hubspot, dynamics]
    persona_relevance:
      cro: 1.0
      cfo: 0.6
      coo: 0.5
    recognition_basis: "Created when a business relationship is established. CRM account creation triggers initial record; ERP account creation follows upon first financial transaction."
    timing_semantics: "Point-in-time entity. Account status (active, inactive, churned) changes are event-driven."
    scope_boundaries: "Includes customer accounts, prospect accounts, and partner accounts. Excludes individual contacts (those are separate entities). Parent-child account hierarchies must be resolved before aggregation."
    calculation_methodology: null
    comparability_rules: "Comparable only when account definition matches across systems. CRM accounts (any relationship) vs ERP accounts (billing entities) represent different populations. Duplicate accounts inflate counts if not deduplicated."

  - id: opportunity
    concept_id: SAL-002
    name: Opportunity
    description: "Potential revenue deal in pipeline"
    domain: sales
    cluster: Growth
    example_fields:
      - opportunity_id
      - deal_id
      - opportunity_name
      - pipeline_id
      - opp_id
      - close_date
      - probability
    aliases:
      - deal
      - pipeline
      - sales_opp
      - opp
      - prospect_deal
    expected_type: string
    typical_source_systems: [salesforce, hubspot, pipedrive]
    persona_relevance:
      cro: 1.0
      cfo: 0.5
    recognition_basis: "Created when a qualified sales prospect is identified. Lifecycle tracked through pipeline stages to close (won or lost)."
    timing_semantics: "Point-in-time entity with stage transitions. Close date is the expected or actual deal completion date."
    scope_boundaries: "Includes all active and historical sales opportunities. Excludes renewals handled as separate renewal objects. Scoped to a single sales team or territory unless rolled up."
    calculation_methodology: null
    comparability_rules: "Pipeline value is NOT comparable to recognized revenue. Weighted pipeline (amount x probability) vs unweighted pipeline must be distinguished. Different stage definitions across CRM instances invalidate direct comparison."

  - id: subscription
    concept_id: SAL-007
    name: Subscription
    description: "Recurring revenue arrangement"
    domain: sales
    cluster: Growth
    example_fields:
      - subscription_id
      - plan_id
      - plan_name
      - subscription_status
      - mrr
      - billing_period
      - renewal_date
    aliases:
      - plan
      - recurring_billing
      - membership
      - sub
      - recurring_plan
      - license
    expected_type: string
    typical_source_systems: [zuora, chargebee, stripe]
    persona_relevance:
      cfo: 0.9
      cro: 0.8
    recognition_basis: "Created when a recurring billing arrangement is activated. Status tracked through active, paused, cancelled, and expired states."
    timing_semantics: "Period-based entity with defined start and end dates. Billing period (monthly, annual) determines revenue recognition cadence."
    scope_boundaries: "Includes SaaS subscriptions, recurring service agreements, and usage-based plans with minimum commitments. Excludes one-time purchases and professional services."
    calculation_methodology: null
    comparability_rules: "MRR vs ARR must use matching conversion (ARR = MRR x 12 only for monthly plans). Subscription value from billing system vs CRM may differ due to discounts, credits, or mid-term changes."

  - id: pipeline_stage
    concept_id: SAL-003
    name: Pipeline Stage
    description: "Phase in the sales process"
    domain: sales
    cluster: Growth
    example_fields:
      - stage
      - deal_stage
      - sales_stage
      - opp_stage
      - stage_id
      - stage_name
      - probability
      - duration_avg
    aliases:
      - deal_stage
      - sales_stage
      - opp_stage
    expected_type: string
    typical_source_systems: [salesforce, hubspot]
    persona_relevance:
      cro: 0.9
    recognition_basis: "Defined during CRM configuration. Stage assignment is event-driven based on sales process milestones."
    timing_semantics: "Point-in-time state. Stage duration is measured from entry to exit. Historical stage progression is tracked for velocity analysis."
    scope_boundaries: "Covers the full sales cycle from qualification to close. Stage definitions vary by sales process (enterprise vs SMB). Excludes post-close stages (implementation, renewal)."
    calculation_methodology: null
    comparability_rules: "Comparable only when stage definitions and exit criteria match. Different CRM instances may have different stage counts and definitions. Win probability percentages assigned to stages vary by organization."

  - id: quote
    concept_id: SAL-004
    name: Quote
    description: "Formal pricing proposal"
    domain: sales
    cluster: Growth
    example_fields:
      - quote_id
      - quote
      - proposal
      - estimate
      - quotation
      - discount
      - expiry_date
    aliases:
      - proposal
      - estimate
      - quotation
      - cpq_quote
    expected_type: string
    typical_source_systems: [salesforce_cpq, dealhub, pandadoc]
    persona_relevance:
      cro: 0.8
      cfo: 0.4
    recognition_basis: "Created when a formal pricing proposal is generated for a prospect or customer."
    timing_semantics: "Point-in-time document with expiration date. Quote-to-close cycle time is measured for sales efficiency."
    scope_boundaries: "Includes binding and non-binding quotes, proposals, and estimates. Excludes informal verbal pricing and list prices."
    calculation_methodology: null
    comparability_rules: "Quote amount is NOT comparable to final contract value — discounts, negotiation, and scope changes occur between quote and close. List price vs net price must be distinguished."

  - id: contract
    concept_id: SAL-005
    name: Contract
    description: "Binding agreement with a customer"
    domain: sales
    cluster: Growth
    example_fields:
      - contract_id
      - contract
      - agreement
      - msa
      - order_form
      - sow
      - start_date
      - end_date
    aliases:
      - agreement
      - msa
      - order_form
      - sow
    expected_type: string
    typical_source_systems: [salesforce, ironclad, docusign_clm]
    persona_relevance:
      cro: 0.8
      cfo: 0.6
    recognition_basis: "Executed when both parties sign the agreement. Effective date may differ from signature date."
    timing_semantics: "Period-based entity with defined start and end dates. Contract terms govern revenue recognition and obligation periods."
    scope_boundaries: "Includes MSAs, order forms, SOWs, and amendments. Excludes verbal agreements and purchase orders unless they constitute binding contracts."
    calculation_methodology: null
    comparability_rules: "Total contract value (TCV) vs annual contract value (ACV) must be distinguished. Multi-year contracts require annualization for period comparison. Contract value from legal vs CRM may differ due to amendments."

  - id: order
    concept_id: SAL-006
    name: Order
    description: "Confirmed purchase request"
    domain: sales
    cluster: Growth
    example_fields:
      - order_id
      - sales_order
      - so
      - purchase
      - order_amount
      - line_items
    aliases:
      - sales_order
      - so
      - purchase
    expected_type: string
    typical_source_systems: [salesforce, shopify, netsuite]
    persona_relevance:
      cro: 0.7
      cfo: 0.5
    recognition_basis: "Created when a customer confirms a purchase. Order acceptance triggers fulfillment workflow."
    timing_semantics: "Point-in-time event. Order date determines the booking period. Fulfillment date may differ from order date."
